<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Карта событий Днепра</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
#map { height: 100vh; width: 100%; }

/* кнопки фильтра */
.filter-box {
    position: fixed;
    bottom: 90px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 12px;
    z-index: 9999;
}

.filter-btn {
    display: block;
    margin: 4px 0;
    padding: 6px;
    border-radius: 8px;
    cursor: pointer;
    background: #eee;
}

.filter-btn.active {
    background: #0088cc;
    color: white;
}

/* кнопки справа */
.btn {
    position: fixed;
    right: 20px;
    padding: 12px 14px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    z-index: 9999;
    font-size: 14px;
}

.channel-btn { bottom: 20px; background: #0088cc; }
.bot-btn { bottom: 70px; background: #28a745; }
.heat-btn { bottom: 120px; background: #ff5722; }
</style>
</head>

<body>

<div id="map"></div>

<div class="filter-box">
<div class="filter-btn active" data-type="danger">🚨 Опасность</div>
<div class="filter-btn active" data-type="police">👮 Полиция</div>
<div class="filter-btn active" data-type="block">🚧 Блок пост</div>
<div class="filter-btn active" data-type="safe">🟢 Чисто</div>
</div>

<a href="https://t.me/dneprrodar_bot" class="btn bot-btn">➕ Добавить</a>
<a href="https://t.me/dnpro_radar" class="btn channel-btn">📢 Канал</a>
<a href="#" id="heatToggle" class="btn heat-btn">🔥 Heatmap</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
let map = L.map('map').setView([48.49, 35.13], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let cluster = L.markerClusterGroup();
map.addLayer(cluster);

let heatLayer = L.heatLayer([], {radius: 25});
let heatEnabled = true;
map.addLayer(heatLayer);

let activeTypes = ["danger","police","block","safe"];
let lastCount = 0;

// фильтр кнопки
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => {
        let type = btn.dataset.type;

        if (activeTypes.includes(type)) {
            activeTypes = activeTypes.filter(t => t !== type);
            btn.classList.remove("active");
        } else {
            activeTypes.push(type);
            btn.classList.add("active");
        }

        loadPoints();
    }
});

// heatmap toggle
document.getElementById("heatToggle").onclick = () => {
    heatEnabled = !heatEnabled;

    if (heatEnabled) {
        map.addLayer(heatLayer);
    } else {
        map.removeLayer(heatLayer);
    }
};

// загрузка
async function loadPoints() {
    let res = await fetch("https://dnepr-kc9y.onrender.com/points");
    let points = await res.json();

    cluster.clearLayers();

    let heatData = [];

    points.forEach(p => {

        if (!activeTypes.includes(p.type)) return;

        if (p.type === "danger") {
            heatData.push([p.lat, p.lon, 1]);
        }

        let icon = L.divIcon({
            html:
                p.type === "safe" ? "🟢" :
                p.type === "police" ? "👮" :
                p.type === "block" ? "🚧" :
                "🚨",
            className: "",
            iconSize: [26,26]
        });

        let marker = L.marker([p.lat, p.lon], {icon});

        marker.on('click', async () => {

            let res = await fetch(`https://dnepr-kc9y.onrender.com/point/${p.id}`);
            let data = await res.json();

            let content = data.content || "";
            let file_url = data.file_url;
            let address = (data.address || "").split(",").slice(0,3).join(",");
            let minutes = Math.floor((Date.now()/1000 - data.timestamp)/60);

            let html = `<b>${p.type}</b><br>${address}<br>`;

            if (file_url) html += `<img src="${file_url}" width="100%">`;
            if (content) html += `<div>${content}</div>`;

            html += `<br>🕒 ${minutes} мин`;

            marker.bindPopup(html).openPopup();
        });

        cluster.addLayer(marker);
    });

    heatLayer.setLatLngs(heatData);

    // авто центр
    if (points.length > lastCount && points.length > 0) {
        let last = points[points.length - 1];
        map.setView([last.lat, last.lon], 15);
    }

    lastCount = points.length;
}

setInterval(loadPoints, 10000);
loadPoints();
</script>

</body>
</html>
