<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Карта событий Днепра | Онлайн карта опасности</title>

<meta name="description" content="Онлайн карта Днепра. Блок посты, опасные зоны и актуальная информация в реальном времени.">
<meta name="keywords" content="Днепр карта, блок посты Днепр, ТЦК Днепр, карта опасности, события Днепр">
<meta name="author" content="Dnipro Map">

<!-- OpenGraph -->
<meta property="og:title" content="Карта событий Днепра">
<meta property="og:description" content="Актуальная карта города в реальном времени">
<meta property="og:type" content="website">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map { height: 100vh; width: 100%; }

/* popup */
.leaflet-popup-content {
    font-size: 16px;
    width: 260px;
}

/* фото */
.leaflet-popup-content img {
    width: 100%;
    border-radius: 10px;
}

/* блок пост */
.big-text {
    font-size: 20px;
    font-weight: bold;
    color: red;
}

/* кнопка Telegram */
.telegram-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0088cc;
    color: white;
    padding: 12px 16px;
    border-radius: 30px;
    text-decoration: none;
    z-index: 9999;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<a href="https://t.me/dnpro_radar" target="_blank" class="telegram-btn">
📢 Канал
</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([48.49, 35.13], 13);

// темы
let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({"Светлая": light, "Тёмная": dark}).addTo(map);

let markers = [];

async function loadPoints() {
    let res = await fetch("https://dnepr-kc9y.onrender.com/points");
    let points = await res.json();

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    points.forEach(p => {

        let color = p.type === "safe" ? "green" : "red";

        let marker = L.circleMarker([p.lat, p.lon], {
            radius: 9,
            color: color,
            fillColor: color,
            fillOpacity: 0.9
        }).addTo(map);

        let hitbox = L.circleMarker([p.lat, p.lon], {
            radius: 18,
            opacity: 0,
            fillOpacity: 0
        }).addTo(map);

        hitbox.on('click', async function () {

            let res = await fetch(`https://dnepr-kc9y.onrender.com/point/${p.id}`);
            let data = await res.json();

            let content = data.content || "";
            let file_url = data.file_url;
            let full = data.address || "";

            // короткий адрес
            let address = "Адрес не найден";
            if (full) {
                let parts = full.split(",");
                address = parts.slice(0, 3).join(",");
            }

            // текст для "чисто"
            if (!content && p.type === "safe") {
                content = "Чисто";
            }

            let html = `<div>
                <b>📍 ${address}</b><br><br>
            `;

            if (file_url) {
                html += `<img src="${file_url}">`;
            } 
            else if (content.toUpperCase().includes("БЛОК")) {
                html += `<div class="big-text">🚧 ${content}</div>`;
            } 
            else if (p.type === "safe") {
                html += `<div style="color:green;font-weight:bold;">🟢 ${content}</div>`;
            }
            else {
                html += `<div>${content}</div>`;
            }

            html += `<br><br><small>ID: ${p.id}</small>`;

            html += `<br><br>
            <a href="https://t.me/ТВОЙ_КАНАЛ" target="_blank"
            style="display:block;text-align:center;background:#0088cc;color:white;padding:8px;border-radius:8px;text-decoration:none;">
            📢 Перейти в канал
            </a>
            </div>`;

            marker.bindPopup(html).openPopup();
        });

        markers.push(marker);
        markers.push(hitbox);
    });
}

setInterval(loadPoints, 10000);
loadPoints();
</script>

</body>
</html>
