<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Карта событий Днепра</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .leaflet-top.leaflet-right { top: 70px; }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([48.49, 35.13], 13);

// Светлая тема
let lightLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Тёмная тема
let darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & Carto'
});

// Переключатель темы
let baseMaps = {
    "Светлая": lightLayer,
    "Тёмная": darkLayer
};
L.control.layers(baseMaps).addTo(map);

let markers = [];

async function loadPoints() {
    try {
        let res = await fetch("https://dnepr-1se5.onrender.com/points");
        let points = await res.json();

        // Удаляем старые маркеры
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        points.forEach(p => {
            let color = p.type === "danger" ? "red" : "green";

            let marker = L.circleMarker([p.lat, p.lon], {
                radius: 8,
                color: color
            }).addTo(map);

            // Клик на точку
            marker.on('click', async function () {
                let res = await fetch(`https://dnepr-1se5.onrender.com/point/${p.id}`);
                let data = await res.json();

                let popupContent = data.content || "Нет данных";
                marker.bindPopup(popupContent).openPopup();
            });

            markers.push(marker);
        });
    } catch (err) {
        console.error("Ошибка при загрузке точек:", err);
    }
}

// Обновляем каждые 10 секунд
setInterval(loadPoints, 10000);
loadPoints();
</script>
</body>
</html>
