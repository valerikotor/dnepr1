<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dnipro Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
#map { height: 100vh; width: 100%; }

/* popup */
.leaflet-popup-content {
    font-size: 18px;
    width: 280px;
    line-height: 1.4;
}

.leaflet-popup-content-wrapper {
    border-radius: 12px;
    padding: 10px;
}

/* фото */
.leaflet-popup-content img {
    width: 100%;
    border-radius: 10px;
    margin-top: 5px;
}

/* видео */
.leaflet-popup-content video {
    width: 100%;
    border-radius: 10px;
    margin-top: 5px;
}

/* блок пост */
.big-text {
    font-size: 22px;
    font-weight: bold;
    color: red;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([48.49, 35.13], 13);

// ===== ТЕМЫ =====
let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({
    "Светлая": light,
    "Тёмная": dark
}).addTo(map);

let markers = [];

// ===== ЗАГРУЗКА ТОЧЕК =====
async function loadPoints() {
    try {
        let res = await fetch("https://dnepr-kc9y.onrender.com/points");
        let points = await res.json();

        // удаляем старые
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        points.forEach(p => {

            // красная точка
            let marker = L.circleMarker([p.lat, p.lon], {
                radius: 14,
                color: "red",
                fillColor: "red",
                fillOpacity: 0.9,
                weight: 2
            }).addTo(map);

            // зона клика (для мобилки)
            let hitbox = L.circleMarker([p.lat, p.lon], {
                radius: 25,
                opacity: 0,
                fillOpacity: 0
            }).addTo(map);

            hitbox.on('click', async function () {

                let res = await fetch(`https://dnepr-kc9y.onrender.com/point/${p.id}`);
                let data = await res.json();

                let content = data.content || "";
                let file_url = data.file_url;
                let address = data.address || "Адрес не найден";

                let html = `<div>
                    <b>📍 ${address}</b><br><br>
                `;

                // фото
                if (file_url) {
                    html += `<img src="${file_url}">`;
                }
                // блок пост
                else if (content.toUpperCase().includes("БЛОК")) {
                    html += `<div class="big-text">🚧 ${content}</div>`;
                }
                // обычный текст
                else {
                    html += `<div>${content}</div>`;
                }

                html += "</div>";

                marker.bindPopup(html).openPopup();
            });

            markers.push(marker);
            markers.push(hitbox);
        });

    } catch (e) {
        console.log("Ошибка загрузки:", e);
    }
}

// ===== ОБНОВЛЕНИЕ =====
setInterval(loadPoints, 10000);
loadPoints();
</script>

</body>
</html>
