<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Карта событий Днепра | Онлайн карта</title>

<meta name="description" content="Онлайн карта Днепра. Актуальные события в реальном времени.">
<meta name="keywords" content="Днепр карта, события, онлайн карта">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- кластер -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
#map { height: 100vh; width: 100%; }

.filter-box {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 12px;
    z-index: 9999;
    font-size: 14px;
}

.telegram-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0088cc;
    color: white;
    padding: 12px 16px;
    border-radius: 30px;
    text-decoration: none;
    z-index: 9999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="filter-box">
<b>Фильтр:</b><br>
<label><input type="checkbox" checked value="danger"> 🚨</label>
<label><input type="checkbox" checked value="police"> 👮</label>
<label><input type="checkbox" checked value="block"> 🚧</label>
<label><input type="checkbox" checked value="safe"> 🟢</label>
</div>

<a href="https://t.me/dnpro_radar" target="_blank" class="telegram-btn">
📢 Канал
</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- heatmap -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
let map = L.map('map').setView([48.49, 35.13], 13);

// темы
let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({"Светлая": light, "Тёмная": dark}).addTo(map);

// кластер
let cluster = L.markerClusterGroup();
map.addLayer(cluster);

// heatmap слой
let heatLayer = L.heatLayer([], {radius: 25}).addTo(map);

// фильтр
function getActiveTypes() {
    return Array.from(document.querySelectorAll(".filter-box input:checked"))
        .map(i => i.value);
}

// загрузка
async function loadPoints() {
    let res = await fetch("https://dnepr-kc9y.onrender.com/points");
    let points = await res.json();

    cluster.clearLayers();

    let heatData = [];

    let active = getActiveTypes();

    points.forEach(p => {

        if (!active.includes(p.type)) return;

        // heatmap (только опасные)
        if (p.type === "danger") {
            heatData.push([p.lat, p.lon, 1]);
        }

        let icon = L.divIcon({
            className: "",
            html:
                p.type === "safe" ? "🟢" :
                p.type === "police" ? "👮" :
                p.type === "block" ? "🚧" :
                "🚨",
            iconSize: [20, 20]
        });

        let marker = L.marker([p.lat, p.lon], { icon });

        marker.on('click', async () => {

            let res = await fetch(`https://dnepr-kc9y.onrender.com/point/${p.id}`);
            let data = await res.json();

            let content = data.content || "";
            let file_url = data.file_url;
            let full = data.address || "";
            let timestamp = data.timestamp;

            let title =
                p.type === "safe" ? "🟢 Чисто" :
                p.type === "police" ? "👮 Полиция" :
                p.type === "block" ? "🚧 Блок пост" :
                "🚨 Опасность";

            let address = full.split(",").slice(0,3).join(",");

            let now = Math.floor(Date.now()/1000);
            let minutes = Math.floor((now - timestamp)/60);

            let html = `<b>${title}</b><br>📍 ${address}<br><br>`;

            if (file_url) html += `<img src="${file_url}" width="100%">`;
            if (content) html += `<div>${content}</div>`;

            html += `<br><small>🕒 ${minutes} мин назад</small>`;
            html += `<br><small>ID: ${p.id}</small>`;

            html += `<br><br><a href="https://t.me/dnpro_radar" target="_blank">📢 Канал</a>`;

            marker.bindPopup(html).openPopup();
        });

        cluster.addLayer(marker);
    });

    heatLayer.setLatLngs(heatData);
}

// обновление
setInterval(loadPoints, 10000);
loadPoints();

// фильтр
document.querySelectorAll(".filter-box input").forEach(el => {
    el.addEventListener("change", loadPoints);
});
</script>

</body>
</html>
