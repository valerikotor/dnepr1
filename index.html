<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Карта событий Днепра | Онлайн карта</title>

<meta name="description" content="Онлайн карта Днепра. Актуальные события в реальном времени.">
<meta name="keywords" content="Днепр карта, события, онлайн карта">
<meta property="og:title" content="Карта событий Днепра">
<meta property="og:description" content="Живая карта города в реальном времени. Смотри ситуацию онлайн.">
<meta property="og:image" content="https://dnepr1.vercel.app/preview.jpg">
<meta property="og:url" content="https://dnepr1.vercel.app">
<meta property="og:type" content="website">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
#map { height: 100vh; width: 100%; }

/* фильтр — ниже и компактнее */
.filter-box {
    position: fixed;
    bottom: 15px;
    left: 10px;
    background: white;
    padding: 8px;
    border-radius: 10px;
    z-index: 9999;
    font-size: 13px;
}

.filter-btn {
    display: block;
    margin: 3px 0;
    padding: 5px 8px;
    border-radius: 8px;
    cursor: pointer;
    background: #eee;
}

.filter-btn.active {
    background: #0088cc;
    color: white;
}

/* кнопки справа одинаковые */
.btn {
    position: fixed;
    right: 15px;
    padding: 10px 12px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    z-index: 9999;
    font-size: 13px;
    background: #0088cc;
}

.bot-btn { bottom: 70px; }
.channel-btn { bottom: 20px; }

.leaflet-popup-content img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- фильтр -->
<div class="filter-box">
<div class="filter-btn active" data-type="danger">🚨 Опасность</div>
<div class="filter-btn active" data-type="police">👮 Полиция</div>
<div class="filter-btn active" data-type="block">🚧 Блок пост</div>
<div class="filter-btn active" data-type="safe">🟢 Чисто</div>
</div>

<!-- кнопки -->
<a href="https://t.me/dneprrodar_bot" class="btn bot-btn">➕ Добавить</a>
<a href="https://t.me/dnpro_radar" class="btn channel-btn">📢 Канал</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map = L.map('map').setView([48.49, 35.13], 13);

// темы (сохранено)
let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({"Светлая": light, "Тёмная": dark}).addTo(map);

// кластер (сохранено)
let cluster = L.markerClusterGroup();
map.addLayer(cluster);

// фильтр
let activeTypes = ["danger","police","block","safe"];

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => {
        let type = btn.dataset.type;

        if (activeTypes.includes(type)) {
            activeTypes = activeTypes.filter(t => t !== type);
            btn.classList.remove("active");
        } else {
            activeTypes.push(type);
            btn.classList.add("active");
        }

        loadPoints();
    }
});

// загрузка
async function loadPoints() {
    let res = await fetch("https://dnepr-kc9y.onrender.com/points");
    let points = await res.json();

    cluster.clearLayers();

    points.forEach(p => {

        if (!activeTypes.includes(p.type)) return;

        // иконки прежнего размера
        let icon = L.divIcon({
            className: "",
            html:
                p.type === "safe" ? "<div style='font-size:20px;'>🟢</div>" :
                p.type === "police" ? "<div style='font-size:20px;'>👮</div>" :
                p.type === "block" ? "<div style='font-size:20px;'>🚧</div>" :
                "<div style='font-size:20px;'>🚨</div>",
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        let marker = L.marker([p.lat, p.lon], { icon });

        marker.on('click', async function () {

            let res = await fetch(`https://dnepr-kc9y.onrender.com/point/${p.id}`);
            let data = await res.json();

            let content = data.content || "";
            let file_url = data.file_url;
            let full = data.address || "";
            let timestamp = data.timestamp;

            let title =
                p.type === "safe" ? "🟢 Чисто" :
                p.type === "police" ? "👮 Полиция" :
                p.type === "block" ? "🚧 Блок пост" :
                "🚨 Опасность";

            let address = full.split(",").slice(0,3).join(",");

            let now = Math.floor(Date.now()/1000);
            let minutes = timestamp ? Math.floor((now - timestamp)/60) : 0;

            let html = `<b>${title}</b><br>📍 ${address}<br><br>`;

            if (file_url) html += `<img src="${file_url}">`;
            if (content) html += `<div>${content}</div>`;

            html += `<br><small>🕒 ${minutes} мин назад</small>`;
            html += `<br><small>ID: ${p.id}</small>`;

            html += `<br><br>
            <a href="https://t.me/dnpro_radar" target="_blank">
            📢 Перейти в канал
            </a>`;

            marker.bindPopup(html).openPopup();
        });

        cluster.addLayer(marker);
    });
}

// обновление
setInterval(loadPoints, 10000);
loadPoints();
</script>

</body>
</html>
